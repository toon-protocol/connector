# Docker Compose configuration for Base Payment Channel E2E Tests
# Provides Anvil + Token Faucet + Two Connector Instances for BLS-level testing
#
# Usage:
#   Start: docker compose -f docker-compose-base-e2e-test.yml up -d
#   Stop:  docker compose -f docker-compose-base-e2e-test.yml down -v
#   Logs:  docker compose -f docker-compose-base-e2e-test.yml logs -f
#
# Architecture:
#   BLS Test → Connector A (Admin API :8081) ←→ Connector B (Admin API :8082)
#                    ↓                                    ↓
#               Anvil (Clean Chain :8545)
#                    ↓
#           Smart Contracts + Token Faucet (Express.js)

services:
  # Anvil - Local EVM Node with preloaded contracts
  # Contracts are baked into anvil-state.json (no compile/deploy at startup)
  # Regenerate state: ./scripts/generate-anvil-state.sh
  anvil_base_e2e:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: anvil_base_e2e
    entrypoint: ["anvil"]
    command:
      - --host=0.0.0.0
      - --port=8545
      - --chain-id=31337
      - --accounts=10
      - --balance=10000
      - --load-state=/contracts/anvil-state.json
    volumes:
      - ./packages/contracts:/contracts:ro
    ports:
      - "8545:8545"
    networks:
      - base-e2e-network
    healthcheck:
      test: ["CMD-SHELL", "cast code 0x5FbDB2315678afecb367f032d93F642f64180aa3 --rpc-url http://localhost:8545 2>/dev/null | grep -q '0x60' || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  # Token Faucet - Express.js faucet for test tokens
  token_faucet_e2e:
    build: ./packages/faucet
    container_name: token_faucet_e2e
    depends_on:
      anvil_base_e2e:
        condition: service_healthy
    networks:
      - base-e2e-network
    environment:
      PORT: 3500
      RPC_URL: http://anvil_base_e2e:8545
      ETH_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      TOKEN_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      TOKEN_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      ETH_AMOUNT: 100
      TOKEN_AMOUNT: 10000
    ports:
      - "3500:3500"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3500/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # TigerBeetle - Accounting database for both connectors
  tigerbeetle_e2e:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.68
    container_name: tigerbeetle_e2e
    security_opt:
      - seccomp=unconfined
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - tigerbeetle-e2e-data:/data
      - ./scripts/init-tigerbeetle.sh:/init-tigerbeetle.sh:ro
    ports:
      - "3000:3000"
    networks:
      - base-e2e-network
    entrypoint: ["/init-tigerbeetle.sh"]
    environment:
      TIGERBEETLE_CLUSTER_ID: "0"
      TIGERBEETLE_REPLICA_COUNT: "1"
      TIGERBEETLE_DATA_DIR: /data
    mem_limit: 4g
    cpus: '1.0'

  # Connector A - First connector instance
  connector_a:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connector_a
    depends_on:
      anvil_base_e2e:
        condition: service_healthy
      tigerbeetle_e2e:
        condition: service_started
    networks:
      - base-e2e-network
    environment:
      # Core Configuration
      NODE_ID: connector-a
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      # Network Ports
      BTP_SERVER_PORT: 4001
      HEALTH_CHECK_PORT: 8080
      ADMIN_API_PORT: 8081

      # Base (EVM) Configuration
      BASE_ENABLED: "true"
      BASE_RPC_URL: http://anvil_base_e2e:8545
      BASE_CHAIN_ID: "31337"
      BASE_REGISTRY_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      BASE_TOKEN_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"

      # Key Management
      KEY_BACKEND: env
      EVM_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

      # TigerBeetle
      TIGERBEETLE_CLUSTER_ID: "0"
      TIGERBEETLE_REPLICAS: tigerbeetle_e2e:3000

      # BTP Peer Authentication (empty = permissionless mode)
      BTP_PEER_CONNECTOR_B_SECRET: ""

      # Settlement
      SETTLEMENT_PREFERENCE: evm
      SETTLEMENT_ENABLED: "true"
    ports:
      - "4001:4001"  # BTP
      - "8080:8080"  # Health
      - "8081:8081"  # Admin API
    volumes:
      - ./examples/e2e-connector-a.yaml:/app/config.yaml:ro
      - connector-a-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Connector B - Second connector instance
  connector_b:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connector_b
    depends_on:
      anvil_base_e2e:
        condition: service_healthy
      tigerbeetle_e2e:
        condition: service_started
    networks:
      - base-e2e-network
    environment:
      # Core Configuration
      NODE_ID: connector-b
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      # Network Ports
      BTP_SERVER_PORT: 4002
      HEALTH_CHECK_PORT: 8090
      ADMIN_API_PORT: 8082

      # Base (EVM) Configuration
      BASE_ENABLED: "true"
      BASE_RPC_URL: http://anvil_base_e2e:8545
      BASE_CHAIN_ID: "31337"
      BASE_REGISTRY_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      BASE_TOKEN_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"

      # Key Management
      KEY_BACKEND: env
      EVM_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"

      # TigerBeetle
      TIGERBEETLE_CLUSTER_ID: "0"
      TIGERBEETLE_REPLICAS: tigerbeetle_e2e:3000

      # BTP Peer Authentication (empty = permissionless mode)
      BTP_PEER_CONNECTOR_A_SECRET: ""

      # Settlement
      SETTLEMENT_PREFERENCE: evm
      SETTLEMENT_ENABLED: "true"
    ports:
      - "4002:4002"  # BTP
      - "8090:8090"  # Health
      - "8082:8082"  # Admin API
    volumes:
      - ./examples/e2e-connector-b.yaml:/app/config.yaml:ro
      - connector-b-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

networks:
  base-e2e-network:
    driver: bridge
    name: base-e2e-network

volumes:
  tigerbeetle-e2e-data:
    driver: local
  connector-a-data:
    driver: local
  connector-b-data:
    driver: local
