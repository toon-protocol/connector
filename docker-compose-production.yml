# =============================================================================
# M2M ILP Connector - Production Docker Compose Stack
# =============================================================================
#
# Complete production deployment including:
# - ILP Connector with EVM settlement support
# - TigerBeetle high-performance accounting database
# - Prometheus metrics collection
# - Grafana dashboards and visualization
# - Jaeger distributed tracing (optional)
#
# Supported Settlement Chains:
#   - Base L2 (EVM): Payment channels via smart contracts
#
# Prerequisites:
#   1. Build connector image: docker build -t agent-runtime/connector:latest .
#   2. Initialize TigerBeetle (one-time):
#      docker run --rm --security-opt seccomp=unconfined -v tigerbeetle-data:/data \
#        ghcr.io/tigerbeetle/tigerbeetle:0.16.68 \
#        format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
#   3. Create .env from template: cp .env.example .env
#   4. Configure .env with your EVM settings
#
# Usage:
#   Start all services:  docker-compose -f docker-compose-production.yml up -d
#   View logs:          docker-compose -f docker-compose-production.yml logs -f
#   Stop all services:  docker-compose -f docker-compose-production.yml down
#   Stop with cleanup:  docker-compose -f docker-compose-production.yml down -v
#
# Service Endpoints:
#   - Connector BTP:     ws://localhost:4000
#   - Connector Health:  http://localhost:8080/health
#   - Connector Metrics: http://localhost:8080/metrics
#   - Explorer UI:       http://localhost:5173
#   - Prometheus:        http://localhost:9090
#   - Grafana:           http://localhost:3001 (admin/admin)
#   - Jaeger UI:         http://localhost:16686 (if enabled)
#
# =============================================================================

services:
  # ===========================================================================
  # TigerBeetle - High-Performance Accounting Database
  # ===========================================================================
  # IMPORTANT: Must initialize data file before first start:
  # docker run --rm --security-opt seccomp=unconfined -v tigerbeetle-data:/data \
  #   ghcr.io/tigerbeetle/tigerbeetle:0.16.68 \
  #   format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
  #
  # PRODUCTION NOTE: For true high availability, deploy 3+ replicas:
  #   - Format each replica with --replica=N --replica-count=3
  #   - Start with --addresses=replica0:3000,replica1:3000,replica2:3000
  #   - See TigerBeetle docs: https://docs.tigerbeetle.com/operating/deploy
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.68
    container_name: m2m-tigerbeetle
    command: start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
    # Required for TigerBeetle's io_uring and direct I/O operations
    security_opt:
      - seccomp=unconfined
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - tigerbeetle-data:/data
    networks:
      - ilp-production-network
    restart: unless-stopped
    healthcheck:
      # TigerBeetle doesn't have HTTP endpoint and minimal Alpine image has nc issues
      # Disable healthcheck; connector will fail fast if TigerBeetle isn't accessible
      disable: true
    # TigerBeetle allocates ~3GB during replica initialization
    # and requires sufficient memory for optimal performance
    mem_limit: 4g
    cpus: '1.0'

  # ===========================================================================
  # M2M ILP Connector - Core Payment Processing
  # ===========================================================================
  connector:
    image: connector/connector:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connector
    environment:
      # Core Configuration
      NODE_ID: ${NODE_ID:-agent-runtime}
      CONFIG_FILE: /app/config.yaml
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Network Ports
      BTP_SERVER_PORT: 4000
      HEALTH_CHECK_PORT: 8080
      EXPLORER_PORT: 5173

      # Environment Mode
      ENVIRONMENT: ${ENVIRONMENT:-production}

      # Settlement Configuration
      SETTLEMENT_PREFERENCE: ${SETTLEMENT_PREFERENCE:-evm}
      SETTLEMENT_ENABLED: ${SETTLEMENT_ENABLED:-true}
      SETTLEMENT_THRESHOLD: ${SETTLEMENT_THRESHOLD:-1000000}
      INITIAL_DEPOSIT_MULTIPLIER: ${INITIAL_DEPOSIT_MULTIPLIER:-1}
      SETTLEMENT_POLLING_INTERVAL: ${SETTLEMENT_POLLING_INTERVAL:-30000}

      # Operational Timeouts
      TIGERBEETLE_OPERATION_TIMEOUT: ${TIGERBEETLE_OPERATION_TIMEOUT:-15000}
      BTP_SEND_TIMEOUT_MS: ${BTP_SEND_TIMEOUT_MS:-10000}

      # Blockchain RPC URLs
      BASE_RPC_URL: ${BASE_RPC_URL:-https://mainnet.base.org}
      BASE_L2_RPC_URL: ${BASE_L2_RPC_URL:-https://mainnet.base.org}

      # M2M Token & Payment Channel Configuration
      M2M_TOKEN_ADDRESS: ${M2M_TOKEN_ADDRESS:-}
      TOKEN_NETWORK_REGISTRY: ${TOKEN_NETWORK_REGISTRY:-}

      # Wallet Addresses (for settlement)
      EVM_ADDRESS: ${EVM_ADDRESS:-}

      # Key Management
      KEY_BACKEND: ${KEY_BACKEND:-env}
      EVM_PRIVATE_KEY: ${EVM_PRIVATE_KEY:-}
      TREASURY_EVM_PRIVATE_KEY: ${TREASURY_EVM_PRIVATE_KEY:-}

      # AWS KMS (if KEY_BACKEND=aws-kms)
      AWS_REGION: ${AWS_REGION:-}
      AWS_KMS_EVM_KEY_ID: ${AWS_KMS_EVM_KEY_ID:-}

      # GCP KMS (if KEY_BACKEND=gcp-kms)
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_LOCATION_ID: ${GCP_LOCATION_ID:-}
      GCP_KEY_RING_ID: ${GCP_KEY_RING_ID:-}
      GCP_KMS_EVM_KEY_ID: ${GCP_KMS_EVM_KEY_ID:-}

      # Azure Key Vault (if KEY_BACKEND=azure-kv)
      AZURE_VAULT_URL: ${AZURE_VAULT_URL:-}
      AZURE_EVM_KEY_NAME: ${AZURE_EVM_KEY_NAME:-}

      # TigerBeetle Connection
      TIGERBEETLE_CLUSTER_ID: "0"
      TIGERBEETLE_REPLICAS: tigerbeetle:3000

      # Monitoring
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}

      # Peer Discovery (optional)
      PEER_DISCOVERY_ENABLED: ${PEER_DISCOVERY_ENABLED:-false}
      PEER_DISCOVERY_ENDPOINTS: ${PEER_DISCOVERY_ENDPOINTS:-}
      PEER_ANNOUNCE_ADDRESS: ${PEER_ANNOUNCE_ADDRESS:-}
    volumes:
      # Configuration file (read-only)
      - ./examples/production-single-node.yaml:/app/config.yaml:ro
      # Persistent data for connector state
      - connector-data:/app/data
      # Optional: Persistent logs
      - connector-logs:/app/logs
    ports:
      # BTP WebSocket server
      - "${BTP_PORT:-4000}:4000"
      # Health check and metrics HTTP server
      - "${HEALTH_CHECK_PORT:-8080}:8080"
      # Explorer UI (NOC Dashboard)
      - "${EXPLORER_PORT:-5173}:5173"
    networks:
      - ilp-production-network
    depends_on:
      tigerbeetle:
        condition: service_started
    restart: unless-stopped
    # Enable io_uring for TigerBeetle client
    security_opt:
      - seccomp=unconfined
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1g
    cpus: '1.0'

  # ===========================================================================
  # Prometheus - Metrics Collection and Alerting
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: m2m-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ilp-production-network
    depends_on:
      connector:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: '0.5'

  # ===========================================================================
  # Grafana - Metrics Visualization and Dashboards
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: m2m-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      # Anonymous access for dashboards (optional)
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # Port 3001 to avoid conflict with TigerBeetle (3000)
      - "3001:3000"
    networks:
      - ilp-production-network
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    cpus: '0.25'

  # ===========================================================================
  # Alertmanager - Alert Routing and Notifications
  # ===========================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: m2m-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - ilp-production-network
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 128m
    cpus: '0.1'

  # ===========================================================================
  # Jaeger - Distributed Tracing (Optional)
  # ===========================================================================
  # Enable with: docker-compose -f docker-compose-production.yml --profile tracing up -d
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: m2m-jaeger
    profiles:
      - tracing
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=100000
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
      - "14250:14250"  # gRPC receiver
    networks:
      - ilp-production-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: '0.5'

# =============================================================================
# Volumes - Persistent Data Storage
# =============================================================================
volumes:
  # TigerBeetle accounting database
  # Contains: 0_0.tigerbeetle data file
  tigerbeetle-data:
    driver: local

  # Connector persistent state
  # Contains: channel data, peer info, wallet state
  connector-data:
    driver: local

  # Connector logs (optional)
  # Contains: JSON log files
  connector-logs:
    driver: local

  # Prometheus time-series data
  # Contains: metrics history (15 day retention)
  prometheus-data:
    driver: local

  # Grafana configuration and state
  # Contains: dashboards, user preferences, alerts
  grafana-data:
    driver: local

  # Alertmanager notification state
  # Contains: silences, notification history
  alertmanager-data:
    driver: local

# =============================================================================
# Networks - Service Communication
# =============================================================================
networks:
  ilp-production-network:
    driver: bridge
    name: m2m-ilp-production-network
