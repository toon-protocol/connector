# Docker Compose override: use in-memory ledger instead of TigerBeetle
#
# Usage:
#   docker compose -f docker-compose-base-e2e-test.yml \
#                  -f docker-compose-e2e-no-tigerbeetle.yml up -d
#
# This override:
#   - Removes TigerBeetle env vars from connectors (falls back to in-memory ledger)
#   - TigerBeetle still starts (due to depends_on) but connectors don't use it

services:
  # Connector A - remove TigerBeetle config, use in-memory ledger
  connector_a:
    environment:
      NODE_ID: connector-a
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      BTP_SERVER_PORT: 4001
      HEALTH_CHECK_PORT: 8080
      ADMIN_API_PORT: 8081
      BASE_ENABLED: "true"
      BASE_RPC_URL: http://anvil_base_e2e:8545
      BASE_CHAIN_ID: "31337"
      BASE_REGISTRY_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      BASE_TOKEN_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      KEY_BACKEND: env
      EVM_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BTP_PEER_CONNECTOR_B_SECRET: ""
      SETTLEMENT_PREFERENCE: evm
      SETTLEMENT_ENABLED: "true"
      # No TIGERBEETLE_CLUSTER_ID or TIGERBEETLE_REPLICAS → in-memory ledger

  # Connector B - remove TigerBeetle config, use in-memory ledger
  connector_b:
    environment:
      NODE_ID: connector-b
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      BTP_SERVER_PORT: 4002
      HEALTH_CHECK_PORT: 8090
      ADMIN_API_PORT: 8082
      BASE_ENABLED: "true"
      BASE_RPC_URL: http://anvil_base_e2e:8545
      BASE_CHAIN_ID: "31337"
      BASE_REGISTRY_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      BASE_TOKEN_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      KEY_BACKEND: env
      EVM_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      BTP_PEER_CONNECTOR_A_SECRET: ""
      SETTLEMENT_PREFERENCE: evm
      SETTLEMENT_ENABLED: "true"
      # No TIGERBEETLE_CLUSTER_ID or TIGERBEETLE_REPLICAS → in-memory ledger
