# Local Blockchain Development Infrastructure
# Anvil (local Ethereum node) + Token Faucet
#
# Usage:
#   make anvil-up      Start Anvil + Faucet
#   make anvil-down    Stop all services
#   make anvil-logs    Follow logs

services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Anvil - Local Ethereum Node with Auto-Deployed Contracts
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: []
    command:
      - sh
      - -c
      - |
        echo "Starting Anvil..."
        anvil --host 0.0.0.0 --port 8545 --chain-id 31337 --accounts 10 --balance 10000 &
        ANVIL_PID=$$!

        echo "Waiting for Anvil to be ready..."
        until cast client --rpc-url http://localhost:8545 2>/dev/null | grep -q 'anvil'; do
          sleep 1
        done

        echo "Deploying contracts..."
        cd /contracts
        forge script script/DeployLocal.s.sol:DeployLocalScript --rpc-url http://localhost:8545 --broadcast --skip-simulation || echo "Deployment failed (non-fatal)"

        echo "Anvil ready with contracts deployed!"
        wait $$ANVIL_PID
    volumes:
      - ./packages/contracts:/contracts
    ports:
      - '8545:8545'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "cast client --rpc-url http://localhost:8545 2>&1 | grep -q 'anvil' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Token Faucet - Provides ETH and USDC tokens for testing
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  faucet:
    build:
      context: ./packages/faucet
      dockerfile: Dockerfile
    environment:
      PORT: 3500
      RPC_URL: http://anvil:8545

      # Account 1 for ETH (has 10k ETH from Anvil)
      ETH_PRIVATE_KEY: '0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d'

      # Account 0 (deployer) for USDC tokens
      TOKEN_PRIVATE_KEY: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'

      # Token address (deterministic from Anvil deployment)
      TOKEN_ADDRESS: '0x5FbDB2315678afecb367f032d93F642f64180aa3'

      # Amounts to send per request
      ETH_AMOUNT: '100'
      TOKEN_AMOUNT: '10000'

    ports:
      - '3500:3500'
    depends_on:
      anvil:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:3500/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
