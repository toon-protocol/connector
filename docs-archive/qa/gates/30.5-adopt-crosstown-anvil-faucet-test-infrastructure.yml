architectural_notes: |
  This story successfully migrates from Base Sepolia fork (external RPC dependency) to a clean-chain
  Anvil setup. Key architectural improvements:

  1. **Faster test startup**: No fork download required
  2. **Offline operation**: No network dependency for tests
  3. **Deterministic addresses**: Contracts always deploy to same addresses
  4. **Production-ready faucet**: Express.js with rate limiting, proper error handling
  5. **Clear separation**: Test infra (Anvil 31337) vs staging/prod (Base Sepolia 84532)

  The migration is complete and maintains backward compatibility with existing test suites.
  Faucet is intentionally JavaScript (not TypeScript) to maintain upstream parity with Crosstown.
