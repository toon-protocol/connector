# M2M Connector Configuration
# Non-sensitive configuration values
#
# This is the base ConfigMap. Use overlays to configure for different environments:
#   - overlays/staging    -> TESTNET (Base Sepolia)
#   - overlays/production -> MAINNET (Base Mainnet)
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: connector-config
  namespace: connector
  labels:
    app.kubernetes.io/name: connector
    app.kubernetes.io/component: config
data:
  # Core Settings
  NODE_ID: "agent-runtime"
  LOG_LEVEL: "info"

  # Network Mode: 'testnet' | 'mainnet'
  # This is a label for documentation; actual URLs are set below
  NETWORK_MODE: "mainnet"

  # Network Ports
  BTP_SERVER_PORT: "4000"
  HEALTH_CHECK_PORT: "8080"
  EXPLORER_PORT: "5173"

  # Environment Mode (development | staging | production)
  ENVIRONMENT: "production"

  # Settlement Configuration
  SETTLEMENT_PREFERENCE: "evm"
  SETTLEMENT_ENABLED: "true"
  SETTLEMENT_THRESHOLD: "1000000"
  INITIAL_DEPOSIT_MULTIPLIER: "1"
  SETTLEMENT_POLLING_INTERVAL: "30000"

  # Operational Timeouts
  TIGERBEETLE_OPERATION_TIMEOUT: "15000"
  BTP_SEND_TIMEOUT_MS: "10000"

  # TigerBeetle Connection
  # Update based on your TigerBeetle deployment
  TIGERBEETLE_CLUSTER_ID: "0"
  TIGERBEETLE_REPLICAS: "tigerbeetle.tigerbeetle.svc.cluster.local:3000"

  # Blockchain RPC URLs
  # Default: MAINNET (override in staging overlay for testnet)
  # Base L2 (EVM)
  BASE_RPC_URL: "https://mainnet.base.org"
  BASE_L2_RPC_URL: "https://mainnet.base.org"

  # Monitoring
  PROMETHEUS_ENABLED: "true"

  # Local Delivery — forward inbound ILP packets to agent-runtime middleware
  LOCAL_DELIVERY_ENABLED: "true"
  LOCAL_DELIVERY_URL: "http://agent-runtime.agent-runtime-core.svc.cluster.local:3100"

  # Peer Discovery (disabled by default)
  PEER_DISCOVERY_ENABLED: "false"
